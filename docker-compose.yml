services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      # Optional: only used for /get-explanation when configured.
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.groq.com/openai/v1}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

